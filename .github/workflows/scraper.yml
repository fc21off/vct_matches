name: VCT Match Scraper
on:
  schedule:
    # GitHub erlaubt offiziell keine 2-Minuten-Intervalle (das ist zu oft).
    # Wir nehmen 5 Minuten, das ist der Standard für solche Bots.
    - cron: '*/5 * * * *'
  workflow_dispatch: # Erlaubt dir, das Skript manuell auf GitHub zu starten

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write # WICHTIG: Damit der Bot die JSON-Datei ändern darf
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - run: pip install requests beautifulsoup4
      - name: Run Scraper
        run: python scraper.py
      - name: Commit and push if changed
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add matches.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update matches.json" && git push)